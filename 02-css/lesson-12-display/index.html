<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Grind - Lesson 12</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>CSS Display</h1>
    </header>

    <main>
        <section>
            <h2>Block Elements</h2>

            <div class="block">Block One</div>
            <div class="block">Block Two</div>
        </section>

        <section>
            <h2>Inline Elements</h2>

            <span class="inline">Inline One</span>
            <span class="inline">Inline Two</span>
        </section>

        <section>
            <h2>Inline-Block Elements</h2>

            <div class="inline-block">Box One</div>
            <div class="inline-block">Box Two</div>
        </section>
    </main>
</body>

</html>
