<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Grind - Lesson 04</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1 id="main-title">CSS Selectors</h1>
    </header>

    <main>
        <section>
            <h2>Element Selector</h2>
            <p>This paragraph demonstrates an element selector.</p>
        </section>

        <section>
            <h2 class="highlight">Class Selector</h2>
            <p class="highlight">This paragraph uses a class selector.</p>
        </section>

        <section>
            <h2>ID Selector</h2>
            <p id="unique-paragraph">This paragraph uses an ID selector.</p>
        </section>
    </main>
</body>

</html>
