<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Grind - Lesson 06</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>CSS Units</h1>
    </header>

    <main>
        <section>
            <h2>Pixels</h2>
            <p class="pixels">This paragraph uses pixel units.</p>
        </section>

        <section>
            <h2>REM</h2>
            <p class="rem">
                This paragraph uses rem units.
            </p>
        </section>

        <section>
            <h2>Percentage</h2>

            <div class="container">
                <p class="percentage">This paragraph demonstrates percentage width.</p>
            </div>
        </section>
    </main>
</body>

</html>
