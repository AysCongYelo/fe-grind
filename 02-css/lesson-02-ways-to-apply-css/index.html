<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Grind - Lesson 02</title>
    <style>
        h2 {
            color: green;
        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Ways to Apply CSS</h1>
    </header>

    <main>
        <section>
            <h2>Inline CSS</h2>
            <p style="color:blue;">This paragraph uses inline CSS.</p>
        </section>

        <section>
            <h2>Internal CSS</h2>
            <p>This section demonstrates internal CSS.</p>
        </section>

        <section>
            <h2>External CSS</h2>
            <p>This section demonstrates external CSS.</p>
        </section>
    </main>
</body>

</html>
