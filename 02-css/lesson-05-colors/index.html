<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Grind - Lesson 05</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>CSS Colors</h1>
    </header>

    <main>
        <section>
            <h2>Named Colors</h2>
            <p class="named">This paragraph uses named colors.</p>
        </section>

        <section>
            <h2>Hex Colors</h2>
            <p class="hex">This paragraph uses hexadecimal colors.</p>
        </section>

        <section>
            <h2>RGB Colors</h2>
            <p class="rgb">This paragraph uses RGB colors.</p>
        </section>
    </main>
</body>

</html>
