<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Grind - Lesson 24</title>
</head>

<body>
    <header>
        <h1>Profile Page</h1>
        <p>This is a small profile page that demonstrates good HTML practices.</p>
    </header>
    <!-- Main Content -->
    <main>
        <section>
            <img src="images/sample.jpg" alt="A sample image">
        </section>

        <section>
            <h2>Programming Languages I am Learning</h2>
            <ul>
                <li>HTML</li>
                <li>CSS</li>
                <li>JavaScript</li>
                <li>React</li>
            </ul>
        </section>

        <section>
            <h2>Resources</h2>
            <a href="https://developer.mozilla.org/en-US/">
                MDN Web Docs
            </a>
        </section>

        <form action="/submit" method="post">
            <fieldset>
                <legend>Sample Form</legend>

                <label for="full-name">Full Name</label>
                <input id="full-name" type="text">
            </fieldset>

            <button type="submit">
                Submit
            </button>
        </form>
    </main>

    <footer>
        <p>&copy; Ace 2026</p>
    </footer>
</body>

</html>
